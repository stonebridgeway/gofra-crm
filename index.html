<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Frontend-only CRM для продаж гофроупаковки: кабинеты команды, канбан, календарь, статистика и внутренний чат."
    />
    <meta name="theme-color" content="#1f2421" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ГОФРА CRM" />
    <meta
      property="og:description"
      content="Кабинеты команды, клиенты, сделки, календарь, статистика и чат в одном CRM-прототипе."
    />
    <meta property="og:image" content="%BASE_URL%og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("gofra-crm:theme:v1") || "system";
          const theme =
            saved === "system"
              ? matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : saved;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <title>ГОФРА CRM — frontend prototype</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
